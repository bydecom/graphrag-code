# Build release artifacts when a version tag is pushed (e.g. v0.1.1).
# PyPI upload is manual or via TestPyPI until TWINE_* secrets are configured.
name: Release build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Build wheel and sdist
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v4
      with:
        name: graphrag-code-core-dist
        path: dist/*
        if-no-files-found: error

    - name: Smoke-install uploaded wheel
      shell: bash
      run: |
        python -m pip install dist/*.whl
        graphrag-code-index --help
        graphrag-code-index --db /tmp/release_smoke.sqlite src
